name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install yamllint pyyaml
      - run: yamllint .
      - run: python scripts/check_unique_ids.py packages dashboards config
      - run: python scripts/check_repository.py
      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: "**/*.md"
